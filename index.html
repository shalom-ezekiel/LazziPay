
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazziPay - Voice-First Fintech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        
        /* Premium Motion Curves */
        :root {
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Noticeable Reveal Animations */
        @keyframes textReveal {
          0% { clip-path: inset(100% 0 0 0); transform: translateY(100px); opacity: 0; }
          100% { clip-path: inset(0 0 0 0); transform: translateY(0); opacity: 1; }
        }

        @keyframes blobFloat {
          0%, 100% { transform: translate(0, 0) scale(1); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
          33% { transform: translate(30px, -50px) scale(1.1); border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
          66% { transform: translate(-20px, 20px) scale(0.9); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        @keyframes pulseSoft {
          0%, 100% { transform: scale(1); opacity: 0.5; }
          50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* Animation Utility Classes */
        .animate-text-reveal { animation: textReveal 1.2s var(--ease-out-expo) forwards; }
        .animate-blob { animation: blobFloat 20s ease-in-out infinite; }
        .animate-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        .reveal-on-scroll {
          opacity: 0;
          transform: translateY(40px) scale(0.96);
          filter: blur(10px);
          transition: all 1s var(--ease-out-expo);
        }
        .reveal-on-scroll.visible {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }

        .stagger-1 { animation-delay: 100ms; }
        .stagger-2 { animation-delay: 200ms; }
        .stagger-3 { animation-delay: 300ms; }
        .stagger-4 { animation-delay: 400ms; }

        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>

</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script>
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      setInterval(() => {
        document.querySelectorAll('.reveal-on-scroll:not(.visible)').forEach(el => {
          observer.observe(el);
        });
      }, 500);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
